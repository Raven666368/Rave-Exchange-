<app-trading-ops-toolbar
  [mode]="mode"
  [killSwitchArmed]="killSwitchArmed"
  [connected]="connected"
  [lastSync]="lastSync"
  (modeChange)="setMode($event)"
  (armKillSwitch)="armKillSwitch()"
  (disarmKillSwitch)="disarmKillSwitch()"
  (refresh)="refresh()">
</app-trading-ops-toolbar>

<app-trading-ops-center
  [vm]="vm$ | async"
  [tabs]="tabs"
  [form]="form"
  [currentSymbol]="appRoot?.currentSymbol() || 'BTCUSDT'"
  [symbolPrice]="(appRoot?.symbolPrices()?.get(appRoot?.currentSymbol() || '')) ?? null"
  [currentVolume24h]="dataStore.currentVolume24h()"
  [spread]="dataStore.spread()"
  (tabChange)="setTab($event)"
  (submitGate)="submitGate($event)"
  (closePanel)="closePanel()">
</app-trading-ops-center>
