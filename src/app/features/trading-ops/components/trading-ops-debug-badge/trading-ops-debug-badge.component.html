<div class="debug-badge">
  <span class="dot" [class.ok]="connected" [class.bad]="!connected"></span>
  <span class="item"><strong>Mode:</strong> {{ mode }}</span>
  <span class="item"><strong>Kill:</strong> {{ killSwitchArmed ? 'ARMED' : 'SAFE' }}</span>
  <span class="item"><strong>Sync:</strong> {{ lastSync || '—' }}</span>
</div>
