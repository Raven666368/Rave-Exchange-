name: Nightly Backup
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Backup Archize
        run: |
          tar -czf backup-$(date +%F).tar.gz .
      - name: Archive Backup
        uses: actions/upload-artifact@v4
        with:
          name: workspace-backup
          path: backup-*.tar.gz
